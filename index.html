<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bruno / Stasi Criogenica</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="scene" aria-label="Parete di una navicella con cella criogenica centrale">
      <div
        class="scene__backdrop"
        role="img"
        aria-label="Interno di una navicella spaziale con cella criogenica illuminata al centro"
      ></div>
      <div class="scene__vignette" aria-hidden="true"></div>
      <div class="scene__atmosphere" aria-hidden="true"></div>

      <section class="stasis-bay" id="stasis-bay" aria-label="Cella criogenica di Bruno">
        <div class="stasis-bay__core">
          <div class="stasis-bay__glow" aria-hidden="true"></div>
          <img
            id="bruno-frame"
            class="bruno"
            src="animazioni/Bruno/IDLE_stasi_criogenica/frame_0000.png"
            alt="Bruno in animazione idle all'interno della cella criogenica"
            decoding="async"
            fetchpriority="high"
          >
          <div class="stasis-bay__mist" aria-hidden="true"></div>
          <div class="stasis-bay__scan" aria-hidden="true"></div>
          <div class="stasis-bay__glass" aria-hidden="true"></div>
        </div>
      </section>

      <div class="hud" aria-hidden="true">
        <span class="hud__label">BRUNO / STASIS</span>
        <span class="hud__status">IDLE LOOP</span>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
